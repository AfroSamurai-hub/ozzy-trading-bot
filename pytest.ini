[pytest]
# Pytest configuration for ozzy-simple

# Add project root to Python path
pythonpath = .

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Test paths
testpaths = tests

# Coverage options (when using pytest-cov)
[coverage:run]
source = .
omit = 
    */tests/*
    */test_*
    */snapshots/*
    */archive/*
    */__pycache__/*
    */venv/*
    */.venv/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
